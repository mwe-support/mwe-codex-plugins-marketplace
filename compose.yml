name: marvel-local-server

services:
  mwe-codex-marketplace:
    build:
      context: .
    image: mwe-codex-plugins-marketplace:local
    container_name: marvel-local-server-mwe-codex-marketplace
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:80"
    environment:
      MARKETPLACE_GITHUB_REPOSITORY: mwe-support/mwe-codex-plugins-marketplace
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: marvel-local-server-mwe-codex-marketplace-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      mwe-codex-marketplace:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token $$CLOUDFLARE_TUNNEL_TOKEN
