name: marvel-local-server

services:
  mwe-codex-marketplace:
    build:
      context: .
    image: mwe-codex-plugins-marketplace:local
    container_name: marvel-local-server-mwe-codex-marketplace
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/registry/plugins.json >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: marvel-local-server-mwe-codex-marketplace-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      mwe-codex-marketplace:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token $$CLOUDFLARE_TUNNEL_TOKEN
