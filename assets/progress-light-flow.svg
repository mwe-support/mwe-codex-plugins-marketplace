<svg xmlns="http://www.w3.org/2000/svg" width="960" height="120" viewBox="0 0 960 120" fill="none">
  <defs>
    <linearGradient id="core" x1="24" y1="60" x2="720" y2="60" gradientUnits="userSpaceOnUse">
