      <stop offset="0.82" stop-color="#ffd17d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffbd55" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="halo" x1="0" y1="60" x2="760" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb84f" stop-opacity="0"/>
      <stop offset="0.36" stop-color="#ffd692" stop-opacity="0.22"/>
      <stop offset="0.69" stop-color="#fff8e8" stop-opacity="0.58"/>
      <stop offset="0.88" stop-color="#ffc364" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffc364" stop-opacity="0"/>
