<svg xmlns="http://www.w3.org/2000/svg" width="720" height="80" viewBox="0 0 720 80" fill="none">
  <defs>
    <linearGradient id="beam" x1="0" y1="40" x2="720" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4d5" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#fff1cb" stop-opacity="0.38"/>
      <stop offset="0.58" stop-color="#fff8e8" stop-opacity="0.92"/>
      <stop offset="0.72" stop-color="#fffefd" stop-opacity="1"/>
      <stop offset="0.86" stop-color="#ffe2a4" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffe2a4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="head" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 40) rotate(90) scale(20 32)">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.22" stop-color="#fff5d7"/>
      <stop offset="0.58" stop-color="#ffd789" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#ffd789" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-25%" y="-160%" width="150%" height="420%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0 0.82 0 0 0.42  0 0 0.42 0 0.1  0 0 0 0.95 0" result="warm"/>
      <feMerge>
        <feMergeNode in="warm"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkGlow" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <path d="M14 40H518" stroke="url(#beam)" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M18 40H520" stroke="#fff7df" stroke-opacity="0.96" stroke-width="1.05" stroke-linecap="round"/>
    <ellipse cx="520" cy="40" rx="26" ry="18" fill="url(#head)"/>
  </g>
  <g filter="url(#sparkGlow)" opacity="0.62" fill="#ffd891">
    <circle cx="88" cy="26" r="1.35"/><circle cx="110" cy="51" r="0.9"/><circle cx="143" cy="31" r="1.1"/>
    <circle cx="178" cy="45" r="0.7"/><circle cx="216" cy="24" r="0.85"/><circle cx="265" cy="55" r="1"/>
    <circle cx="312" cy="35" r="0.68"/><circle cx="358" cy="48" r="0.8"/><circle cx="413" cy="29" r="0.7"/>
  </g>
</svg>
