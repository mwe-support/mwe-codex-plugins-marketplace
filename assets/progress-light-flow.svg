    <radialGradient id="head" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(712 60) rotate(90) scale(30 48)">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.17" stop-color="#fff8e8"/>
