name: Marketplace Auto Review

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: marketplace-auto-review-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-review:
    if: >-
      (github.event_name == 'issues' && contains(toJson(github.event.issue.labels), 'plugin-submission')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/marketplace submit ')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'Marketplace 管理员密码校验已通过'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Extract submission URL
        id: extract
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_ACTOR: ${{ github.event.issue.user.login }}
          COMMENT_ACTOR: ${{ github.event.comment.user.login }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const eventName = process.env.EVENT_NAME;
          const issueText = `${process.env.ISSUE_TITLE || ''}\n${process.env.ISSUE_BODY || ''}`;
          const body = eventName === 'issue_comment' ? process.env.COMMENT_BODY : issueText;
          const text = String(body || '');
          const match = text.match(/https:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+/);
          const issueActor = String(process.env.ISSUE_ACTOR || '');
          const commentActor = String(process.env.COMMENT_ACTOR || '');
          const repositoryOwner = String(process.env.REPOSITORY_OWNER || '');
          const adminText = eventName === 'issue_comment' ? text : issueText;
          const actor = eventName === 'issue_comment' ? commentActor : issueActor;
          const adminApproved = actor.toLowerCase() === repositoryOwner.toLowerCase()
            && /Marketplace 管理员密码校验已通过/.test(adminText);
          const actionMatch = adminText.match(/###\s*管理员操作\s*\n([a-z-]+)/);
          const adminAction = adminApproved ? (actionMatch?.[1] || '') : '';
          if (!match) {
            console.error('No GitHub repository URL found in submission.');
            process.exit(1);
          }
          if (adminAction && !['manual-approve', 'remove-submission'].includes(adminAction)) {
            console.error('Unsupported admin action: ' + adminAction);
            process.exit(1);
          }
          console.log(`url=${match[0].replace(/\.git$/, '')}`);
          console.log(`admin_action=${adminAction}`);
          NODE
      - name: Auto-review and sync marketplace
        id: review
        env:
          SUBMISSION_URL: ${{ steps.extract.outputs.url }}
          SUBMITTER: ${{ github.actor }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ADMIN_ACTION: ${{ steps.extract.outputs.admin_action }}
        run: |
          set -o pipefail
          {
            if [ "$ADMIN_ACTION" = "remove-submission" ]; then
              node scripts/marketplace.mjs remove-submission "$SUBMISSION_URL" --by "marketplace-admin" --issue "$ISSUE_URL" --reason "marketplace admin removed failed submission"
            elif [ "$ADMIN_ACTION" = "manual-approve" ]; then
              node scripts/marketplace.mjs auto-review "$SUBMISSION_URL" --by "marketplace-admin" --issue "$ISSUE_URL" --manual-approve true
            else
              node scripts/marketplace.mjs auto-review "$SUBMISSION_URL" --by "@$SUBMITTER" --issue "$ISSUE_URL"
            fi
            node scripts/marketplace.mjs sync
            node scripts/marketplace.mjs sync --check
          } 2>&1 | tee auto-review.log
      - name: Commit approved plugin
        id: commit
        run: |
          if git diff --quiet -- marketplace/submissions marketplace/plugins marketplace/snapshots registry/plugins.json marketplace.json .agents/plugins/marketplace.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketplace/submissions marketplace/plugins marketplace/snapshots registry/plugins.json marketplace.json .agents/plugins/marketplace.json
          git commit -m "Auto-approve marketplace submission"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Comment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          JOB_STATUS: ${{ job.status }}
          SUBMISSION_URL: ${{ steps.extract.outputs.url }}
          CHANGED: ${{ steps.commit.outputs.changed }}
          ADMIN_ACTION: ${{ steps.extract.outputs.admin_action }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            if [ "$ADMIN_ACTION" = "remove-submission" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "管理员已删除上传请求。提交仓库：$SUBMISSION_URL；是否产生新提交：${CHANGED:-unknown}。"
            elif [ "$ADMIN_ACTION" = "manual-approve" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "管理员手动通过上传请求并已同步 Marketplace。提交仓库：$SUBMISSION_URL；静态安全扫描结果已保留为管理员复核记录；是否产生新提交：${CHANGED:-unknown}。"
            else
              gh issue comment "$ISSUE_NUMBER" --body "自动审核通过并已同步 Marketplace。提交仓库：$SUBMISSION_URL；静态安全扫描已完成；是否产生新提交：${CHANGED:-unknown}。"
            fi
          else
            DETAIL="$(tail -n 40 auto-review.log 2>/dev/null || true)"
            cat > comment.md <<EOF
            自动审核未通过。提交仓库：$SUBMISSION_URL

            失败详情：
            ```text
            $DETAIL
            ```

            可以调整插件 manifest 后重新编辑 issue，或由管理员手动通过。
            EOF
            gh issue comment "$ISSUE_NUMBER" --body-file comment.md
          fi
